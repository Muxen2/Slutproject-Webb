<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact | Golden Tone</title>

  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
</head>

<body>

  <header>
    <nav class="navbar">

      <div>
        <img src="Bilder/pia3.0-removebg-preview.png" alt="Logo" class="logo1" />
      </div>

      <div class="nav-links" id="navLinks">
        <button id="homeBtn">Home</button>
        <button id="storeBtn">Store</button>
        <button id="aboutBtn">About</button>
        <button id="contactBtn">Contact</button>
      </div>

      <div class="hamburger" id="hamburger">☰</div>

      <div class="profile-icon">👤</div>

    </nav>
  </header>

  <main>

    <form id="contactForm" class="contact-form">

      <div class="row">
        <input type="text" id="name" placeholder="First Name" required>
        <input type="text" id="surname" placeholder="Last Name" required>
      </div>

      <input type="email" id="email" placeholder="Email Address" required>

      <textarea id="message" placeholder="Your message..." required></textarea>

      <button type="submit">Send Message</button>

      <p id="status"></p>

    </form>

  </main>

  <footer class="footer">

    <div class="footer-top">

      <div class="footer-left">
        <img src="Bilder/pia3.0-removebg-preview.png" alt="Logo" class="logo1">

        <div class="address">
          <strong>Address:</strong>
          <p>Åvaskolgränd 2, Täby<br>Stockholm, Sweden</p>
        </div>

        <div class="socials">
          <a href="https://www.youtube.com/" target="_blank">
            <img src="Bilder/Youtube_logo.png" alt="Youtube" class="icons">
          </a>

          <a href="https://www.instagram.com/" target="_blank">
            <img src="Bilder/Instagram_icon.png" alt="Instagram" class="icons">
          </a>

          <a href="https://twitter.com/" target="_blank">
            <img src="Bilder/Twitter.png" alt="Twitter" class="icons">
          </a>
        </div>

      </div>

      <div class="footer-right">

        <div class="footer-column">
          <h4>Navigation</h4>
          <a href="index.html">Home</a>
          <a href="store.html">Store</a>
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
        </div>

        <div class="footer-column">
          <h4>Socials</h4>
          <a href="https://www.youtube.com/" target="_blank">Youtube</a>
          <a href="https://www.instagram.com/" target="_blank">Instagram</a>
          <a href="https://twitter.com/" target="_blank">Twitter</a>
        </div>

        <div class="footer-column">
          <h4>Location</h4>
          <a href="https://www.google.com/maps/place/%C3%85va+gymnasium" target="_blank">
            Åva Gymnasium
          </a>
        </div>

      </div>

    </div>

    <div class="footer-bottom">
      <p>© 2026 GoldenTone co. All rights reserved.</p>

      <div class="footer-links">
        <a href="PrivacyPolicy.html" target="_blank">Privacy Policy</a>
        <a href="TermsOfService.html" target="_blank">Terms of Service</a>
      </div>

    </div>

  </footer>

</body>
</html>
